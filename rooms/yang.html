<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小羊的房间 · Love Nest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0f5;
    --bg-warm: #faf5fa;
    --card: #fffcff;
    --card-hover: #fff7ff;
    --border: #e5d8e5;
    --border-light: #f0e5f0;
    --text: #3d2e3d;
    --text-secondary: #8a7089;
    --text-muted: #b5a0b4;
    --accent: #c9a0c9;
    --accent-light: #e8d0e8;
    --accent-dark: #9e6e9e;
    --shadow-sm: 0 1px 3px rgba(61,46,61,0.06);
    --shadow-md: 0 4px 12px rgba(61,46,61,0.08);
    --shadow-lg: 0 8px 24px rgba(61,46,61,0.1);
    --radius: 12px;
    --radius-lg: 18px;
    --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
    --font-body: 'Noto Sans SC', -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-weight: 300;
    line-height: 1.7;
  }

  /* ===== Header ===== */
  .room-header {
    padding: 40px 32px 24px;
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text-secondary);
    font-size: 13px;
    letter-spacing: 0.5px;
    transition: color 0.3s;
  }
  .back-link:hover { color: var(--accent-dark); }
  .back-link svg { width: 16px; height: 16px; }
  .room-title-area { flex: 1; text-align: center; }
  .room-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 2px;
  }
  .room-title em { font-style: italic; color: var(--accent-dark); }
  .room-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* ===== Content ===== */
  .content-area {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 32px 60px;
  }

  /* ===== View transitions ===== */
  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Gallery View ===== */
  .gallery-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .gallery-count {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .add-btn {
    padding: 8px 16px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: none;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-body);
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent-dark); }

  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }

  .char-card {
    position: relative;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.3s;
  }
  .char-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }

  .char-card-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: var(--border-light);
  }
  .char-card-img.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: var(--text-muted);
  }

  .char-card-info {
    padding: 12px 14px;
  }
  .char-card-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .char-card-tags {
    margin-top: 4px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .char-card-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    background: var(--accent-light);
    color: var(--accent-dark);
  }

  /* Hover overlay */
  .char-card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(61,46,61,0.85));
    padding: 60px 14px 14px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .char-card:hover .char-card-overlay { opacity: 1; }
  .char-card-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.9);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ===== Detail View ===== */
  .detail-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    margin-bottom: 20px;
    transition: color 0.2s;
    background: none;
    border: none;
    font-family: var(--font-body);
  }
  .detail-back:hover { color: var(--accent-dark); }

  .detail-header {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
  }
  .detail-avatar {
    width: 140px;
    height: 186px;
    border-radius: var(--radius-lg);
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-md);
  }
  .detail-avatar.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    background: var(--card);
  }
  .detail-meta { flex: 1; }
  .detail-name {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }
  .detail-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 16px;
  }

  .detail-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 20px;
  }
  .detail-tab {
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    position: relative;
    font-family: var(--font-body);
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .detail-tab:hover { color: var(--text-secondary); }
  .detail-tab.active { color: var(--text); font-weight: 500; }
  .detail-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 20px;
    right: 20px;
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
  }

  .detail-panel { display: none; }
  .detail-panel.active { display: block; }

  /* Saves list */
  .save-item {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .save-item:hover {
    border-color: var(--accent-light);
    box-shadow: var(--shadow-sm);
    transform: translateX(4px);
  }
  .save-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .save-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .save-arrow {
    color: var(--text-muted);
    font-size: 16px;
  }

  /* Definition view */
  .definition-box {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    font-size: 13px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 500px;
    overflow-y: auto;
  }

  /* ===== Reader View ===== */
  .reader-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-light);
  }
  .reader-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .reader-info {
    font-size: 12px;
    color: var(--text-muted);
  }

  .chat-log {
    max-width: 700px;
    margin: 0 auto;
  }

  .chat-msg {
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease both;
  }
  .chat-msg-header {
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .chat-msg.user .chat-msg-header { color: var(--accent-dark); }
  .chat-msg.char .chat-msg-header { color: var(--text-secondary); }

  .chat-msg-body {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    padding: 16px 20px;
    border-radius: var(--radius-lg);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .chat-msg.user .chat-msg-body {
    background: var(--accent-light);
    border: 1px solid var(--accent);
    margin-left: 24px;
  }
  .chat-msg.char .chat-msg-body {
    background: var(--card);
    border: 1px solid var(--border-light);
    margin-right: 24px;
  }

  /* Italic actions in RP */
  .chat-msg-body em {
    color: var(--text-secondary);
    font-style: italic;
  }

  /* ===== Add Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(61,46,61,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg-warm);
    border-radius: var(--radius-lg);
    padding: 32px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal h3 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text);
  }
  .modal label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .modal input, .modal textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-body);
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { min-height: 100px; resize: vertical; line-height: 1.7; }

  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .btn {
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-secondary {
    background: var(--bg);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border-light); }

  /* File drop area */
  .file-drop {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin-bottom: 14px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    font-size: 12px;
  }
  .file-drop:hover, .file-drop.dragover {
    border-color: var(--accent);
    background: rgba(201,160,201,0.05);
    color: var(--accent-dark);
  }
  .file-drop img {
    max-height: 120px;
    border-radius: 8px;
    margin-bottom: 8px;
  }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 14px; letter-spacing: 0.5px; }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .room-header { padding: 28px 20px 16px; }
    .room-title { font-size: 22px; }
    .content-area { padding: 0 16px 40px; }
    .char-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .detail-header { flex-direction: column; align-items: center; text-align: center; }
    .detail-avatar { width: 120px; height: 160px; }
    .chat-msg.user .chat-msg-body { margin-left: 8px; }
    .chat-msg.char .chat-msg-body { margin-right: 8px; }
    .modal { padding: 24px 20px; }
  }
</style>
</head>
<body>

<header class="room-header">
  <a href="../index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 19l-7-7 7-7"/></svg>
    回到小窝
  </a>
  <div class="room-title-area">
    <h1 class="room-title"><em>小羊</em>的房间</h1>
    <div class="room-subtitle">YANG'S ROOM</div>
  </div>
  <div style="width:60px;"></div>
</header>

<main class="content-area">

  <!-- VIEW 1: Gallery -->
  <div id="view-gallery" class="view active">
    <div class="gallery-toolbar">
      <span class="gallery-count" id="charCount"></span>
      <button class="add-btn" id="addCharBtn">+ 新角色卡</button>
    </div>
    <div class="char-grid" id="charGrid"></div>
  </div>

  <!-- VIEW 2: Character Detail -->
  <div id="view-detail" class="view">
    <button class="detail-back" id="detailBack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M15 19l-7-7 7-7"/></svg>
      返回画廊
    </button>
    <div class="detail-header" id="detailHeader"></div>
    <div class="detail-tabs">
      <button class="detail-tab active" data-panel="saves">存档</button>
      <button class="detail-tab" data-panel="definition">角色设定</button>
    </div>
    <div id="panel-saves" class="detail-panel active"></div>
    <div id="panel-definition" class="detail-panel"></div>
    <div style="margin-top:16px;">
      <button class="add-btn" id="addSaveBtn">+ 导入存档</button>
    </div>
  </div>

  <!-- VIEW 3: Reader -->
  <div id="view-reader" class="view">
    <button class="detail-back" id="readerBack">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M15 19l-7-7 7-7"/></svg>
      返回角色
    </button>
    <div class="reader-header" id="readerHeader"></div>
    <div class="chat-log" id="chatLog"></div>
  </div>

</main>

<!-- Add Character Modal -->
<div class="modal-overlay" id="charModal">
  <div class="modal">
    <h3>新角色卡</h3>
    <div class="file-drop" id="imgDrop">
      点击或拖拽角色卡图片到这里
      <input type="file" accept="image/*" id="imgInput" style="display:none">
    </div>
    <label>角色名</label>
    <input type="text" id="charName" placeholder="角色名称">
    <label>简介</label>
    <textarea id="charDesc" placeholder="角色简介，hover时显示"></textarea>
    <label>设定 (JSON / 文本)</label>
    <textarea id="charDef" placeholder="粘贴SillyTavern角色卡的JSON或设定文本" style="min-height:120px;font-size:12px;"></textarea>
    <label>标签（逗号分隔）</label>
    <input type="text" id="charTags" placeholder="原创, 奇幻, 恋爱...">
    <div class="modal-btns">
      <button class="btn btn-secondary" id="charModalClose">取消</button>
      <button class="btn btn-primary" id="charModalSave">保存</button>
    </div>
  </div>
</div>

<!-- Import Save Modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <h3>导入存档</h3>
    <label>存档标题</label>
    <input type="text" id="saveTitle" placeholder="给这段剧情起个名字">
    <label>剧情简介（可选）</label>
    <textarea id="saveSummary" placeholder="大概讲了什么" style="min-height:60px;"></textarea>
    <label>聊天记录</label>
    <div class="file-drop" id="jsonlDrop">
      拖拽 .jsonl 聊天记录到这里，或点击选择文件
      <input type="file" accept=".jsonl,.json,.txt" id="jsonlInput" style="display:none">
    </div>
    <textarea id="saveJsonl" placeholder="或直接粘贴JSONL内容..." style="min-height:120px;font-size:11px;"></textarea>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="saveModalClose">取消</button>
      <button class="btn btn-primary" id="saveModalSave">导入</button>
    </div>
  </div>
</div>

<script>
(function() {
  const API = 'https://love-nest-api.zeabur.app';
  let currentCharId = null;

  // ===== View switching =====
  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('detailBack').onclick = () => showView('gallery');
  document.getElementById('readerBack').onclick = () => {
    showView('detail');
    loadSaves(currentCharId);
  };

  // Detail sub-tabs
  document.querySelectorAll('.detail-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    });
  });

  // ===== Gallery =====
  async function loadGallery() {
    const grid = document.getElementById('charGrid');
    const count = document.getElementById('charCount');
    try {
      const res = await fetch(`${API}/rooms/yang/characters`);
      if (!res.ok) throw new Error();
      const chars = await res.json();
      count.textContent = chars.length ? `${chars.length} 张角色卡` : '';
      if (!chars.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
          <div class="icon">🐑</div>
          <p>还没有角色卡</p>
          <p style="margin-top:8px;font-size:12px;">点击上方「+ 新角色卡」添加你的第一张卡</p>
        </div>`;
        return;
      }
      grid.innerHTML = chars.map(c => `
        <div class="char-card" data-id="${c.id}">
          ${c.image
            ? `<img class="char-card-img" src="${c.image.startsWith('data:') || c.image.startsWith('http') ? '' : API}${c.image}" alt="${esc(c.name)}" onerror="this.outerHTML='<div class=\\'char-card-img placeholder\\'>🎭</div>'">`
            : '<div class="char-card-img placeholder">🎭</div>'
          }
          <div class="char-card-info">
            <div class="char-card-name">${esc(c.name)}</div>
            ${c.tags && c.tags.length ? `<div class="char-card-tags">${c.tags.slice(0,3).map(t => `<span class="char-card-tag">${esc(t)}</span>`).join('')}</div>` : ''}
          </div>
          ${c.description ? `<div class="char-card-overlay"><div class="char-card-desc">${esc(c.description)}</div></div>` : ''}
        </div>
      `).join('');

      grid.querySelectorAll('.char-card').forEach(card => {
        card.addEventListener('click', () => openDetail(card.dataset.id, chars));
      });
    } catch (e) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">🐑</div><p>后端接口暂未就绪</p></div>`;
    }
  }

  // ===== Detail =====
  async function openDetail(charId, chars) {
    currentCharId = charId;
    const char = chars ? chars.find(c => c.id === charId) : null;
    if (!char) return;

    const header = document.getElementById('detailHeader');
    header.innerHTML = `
      ${char.image
        ? `<img class="detail-avatar" src="${char.image.startsWith('data:') || char.image.startsWith('http') ? '' : API}${char.image}" alt="${esc(char.name)}" onerror="this.outerHTML='<div class=\\'detail-avatar placeholder\\'>🎭</div>'">`
        : '<div class="detail-avatar placeholder">🎭</div>'
      }
      <div class="detail-meta">
        <div class="detail-name">${esc(char.name)}</div>
        <div class="detail-desc">${esc(char.description || '暂无简介')}</div>
        ${char.tags && char.tags.length ? `<div class="char-card-tags">${char.tags.map(t => `<span class="char-card-tag">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>`;

    // Definition
    const defPanel = document.getElementById('panel-definition');
    defPanel.innerHTML = char.definition
      ? `<div class="definition-box">${esc(char.definition)}</div>`
      : `<div class="empty-state"><p>暂无设定数据</p></div>`;

    // Reset to saves tab
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.detail-tab[data-panel="saves"]').classList.add('active');
    document.getElementById('panel-saves').classList.add('active');

    await loadSaves(charId);
    showView('detail');
  }

  async function loadSaves(charId) {
    const panel = document.getElementById('panel-saves');
    try {
      const res = await fetch(`${API}/rooms/yang/characters/${charId}/saves`);
      if (!res.ok) throw new Error();
      const saves = await res.json();
      if (!saves.length) {
        panel.innerHTML = `<div class="empty-state"><div class="icon">📄</div><p>还没有存档</p></div>`;
        return;
      }
      panel.innerHTML = saves.map(s => `
        <div class="save-item" data-id="${s.id}">
          <div>
            <div class="save-title">${esc(s.title)}</div>
            <div class="save-meta">${s.messageCount} 条对话${s.summary ? ' · ' + esc(s.summary).slice(0, 40) : ''}</div>
          </div>
          <span class="save-arrow">→</span>
        </div>
      `).join('');

      panel.querySelectorAll('.save-item').forEach(item => {
        item.addEventListener('click', () => openReader(charId, item.dataset.id));
      });
    } catch (e) {
      panel.innerHTML = `<div class="empty-state"><p>存档暂时打不开</p></div>`;
    }
  }

  // ===== Reader =====
  async function openReader(charId, saveId) {
    const header = document.getElementById('readerHeader');
    const log = document.getElementById('chatLog');
    header.innerHTML = '<div class="reader-title">加载中...</div>';
    log.innerHTML = '';
    showView('reader');

    try {
      const res = await fetch(`${API}/rooms/yang/characters/${charId}/saves/${saveId}`);
      if (!res.ok) throw new Error();
      const save = await res.json();

      header.innerHTML = `
        <div>
          <div class="reader-title">${esc(save.title)}</div>
          ${save.summary ? `<div class="reader-info">${esc(save.summary)}</div>` : ''}
        </div>
        <div class="reader-info">${save.messages ? save.messages.length : 0} 条对话</div>`;

      if (!save.messages || !save.messages.length) {
        log.innerHTML = `<div class="empty-state"><p>这个存档是空的</p></div>`;
        return;
      }

      log.innerHTML = save.messages.map((m, i) => {
        let content = esc(m.content);
        // Render *italics* for RP actions
        content = content.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        return `
          <div class="chat-msg ${m.isUser ? 'user' : 'char'}" style="animation-delay:${Math.min(i * 0.03, 1)}s">
            <div class="chat-msg-header">${esc(m.name)}</div>
            <div class="chat-msg-body">${content}</div>
          </div>`;
      }).join('');
    } catch (e) {
      log.innerHTML = `<div class="empty-state"><p>存档加载失败</p></div>`;
    }
  }

  // ===== Add Character Modal =====
  const charModal = document.getElementById('charModal');
  let imgBase64 = '';

  document.getElementById('addCharBtn').onclick = () => {
    charModal.classList.add('active');
    imgBase64 = '';
    document.getElementById('imgDrop').innerHTML = '点击或拖拽角色卡图片到这里<input type="file" accept="image/*" id="imgInput" style="display:none">';
    ['charName','charDesc','charDef','charTags'].forEach(id => document.getElementById(id).value = '');
    setupImgDrop();
  };
  document.getElementById('charModalClose').onclick = () => charModal.classList.remove('active');

  function setupImgDrop() {
    const drop = document.getElementById('imgDrop');
    const input = document.getElementById('imgInput');
    drop.onclick = () => input.click();
    drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = e => {
      e.preventDefault();
      drop.classList.remove('dragover');
      handleImgFile(e.dataTransfer.files[0]);
    };
    input.onchange = () => { if (input.files[0]) handleImgFile(input.files[0]); };
  }

  function handleImgFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      imgBase64 = e.target.result;
      const drop = document.getElementById('imgDrop');
      drop.innerHTML = `<img src="${imgBase64}" style="max-height:120px;border-radius:8px;"><br>点击更换图片<input type="file" accept="image/*" id="imgInput" style="display:none">`;
      setupImgDrop();
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('charModalSave').onclick = async () => {
    const name = document.getElementById('charName').value.trim();
    if (!name) return alert('请输入角色名');
    const body = {
      name,
      description: document.getElementById('charDesc').value.trim(),
      definition: document.getElementById('charDef').value.trim(),
      tags: document.getElementById('charTags').value.split(',').map(s => s.trim()).filter(Boolean)
    };
    if (imgBase64) body.image = imgBase64;
    try {
      const res = await fetch(`${API}/rooms/yang/characters`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        // Upload image separately if large
        if (imgBase64 && data.char && data.char.id) {
          await fetch(`${API}/rooms/yang/characters/${data.char.id}/image`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imgBase64 })
          });
        }
        charModal.classList.remove('active');
        loadGallery();
      }
    } catch (e) {
      alert('保存失败: ' + e.message);
    }
  };

  // ===== Import Save Modal =====
  const saveModal = document.getElementById('saveModal');
  let jsonlContent = '';

  document.getElementById('addSaveBtn').onclick = () => {
    saveModal.classList.add('active');
    jsonlContent = '';
    ['saveTitle','saveSummary','saveJsonl'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('jsonlDrop').innerHTML = '拖拽 .jsonl 聊天记录到这里，或点击选择文件<input type="file" accept=".jsonl,.json,.txt" id="jsonlInput" style="display:none">';
    setupJsonlDrop();
  };
  document.getElementById('saveModalClose').onclick = () => saveModal.classList.remove('active');

  function setupJsonlDrop() {
    const drop = document.getElementById('jsonlDrop');
    const input = document.getElementById('jsonlInput');
    drop.onclick = () => input.click();
    drop.ondragover = e => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = e => {
      e.preventDefault();
      drop.classList.remove('dragover');
      handleJsonlFile(e.dataTransfer.files[0]);
    };
    input.onchange = () => { if (input.files[0]) handleJsonlFile(input.files[0]); };
  }

  function handleJsonlFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      jsonlContent = e.target.result;
      document.getElementById('saveJsonl').value = jsonlContent;
      document.getElementById('jsonlDrop').innerHTML = `✓ 已读取 ${file.name}<input type="file" accept=".jsonl,.json,.txt" id="jsonlInput" style="display:none">`;
      setupJsonlDrop();
    };
    reader.readAsText(file);
  }

  document.getElementById('saveModalSave').onclick = async () => {
    const title = document.getElementById('saveTitle').value.trim();
    const jsonl = document.getElementById('saveJsonl').value.trim() || jsonlContent;
    if (!title) return alert('请输入存档标题');
    if (!jsonl) return alert('请提供聊天记录');
    try {
      const res = await fetch(`${API}/rooms/yang/characters/${currentCharId}/import-jsonl`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title,
          summary: document.getElementById('saveSummary').value.trim(),
          jsonl
        })
      });
      const data = await res.json();
      if (data.success) {
        saveModal.classList.remove('active');
        loadSaves(currentCharId);
      } else {
        alert('导入失败: ' + (data.error || ''));
      }
    } catch (e) {
      alert('导入失败: ' + e.message);
    }
  };

  // ===== Utils =====
  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ===== Init =====
  loadGallery();
})();
</script>
</body>
</html>
