<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小羊的房间 · Love Nest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0f5;--card:#fffcff;--border:#e5d8e5;--border-light:#f0e5f0;
  --text:#3d2e3d;--text-sec:#8a7089;--text-muted:#b5a0b4;
  --accent:#c9a0c9;--accent-light:#e8d0e8;--accent-dark:#9e6e9e;
  --quote-bg:#f8f0f8;--quote-border:#d8c0d8;
  --action-bg:rgba(158,110,158,0.08);--dialogue-color:#8a5090;
  --shadow-sm:0 1px 3px rgba(61,46,61,0.06);--shadow-md:0 4px 12px rgba(61,46,61,0.08);
  --r:12px;--rl:18px;
  --fd:'Cormorant Garamond','Noto Serif SC',serif;
  --fb:'Noto Sans SC',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;font-weight:300;line-height:1.7}

/* Header */
.hdr{padding:40px 32px 24px;max-width:960px;margin:0 auto;display:flex;align-items:center;gap:16px}
.back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-sec);font-size:13px;transition:color .3s}
.back:hover{color:var(--accent-dark)}
.back svg{width:16px;height:16px}
.hdr-center{flex:1;text-align:center}
.hdr h1{font-family:var(--fd);font-size:28px;font-weight:400;letter-spacing:2px}
.hdr h1 em{font-style:italic;color:var(--accent-dark)}
.hdr .sub{font-size:12px;color:var(--text-muted);letter-spacing:3px;margin-top:4px}

.main{max-width:960px;margin:0 auto;padding:0 32px 60px}

/* Views */
.v{display:none}.v.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Breadcrumb */
.crumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);margin-bottom:16px;flex-wrap:wrap}
.crumb span{cursor:pointer;transition:color .2s}.crumb span:hover{color:var(--accent-dark)}
.crumb .sep{cursor:default;opacity:.5}
.crumb .cur{color:var(--text);cursor:default;font-weight:500}

/* Toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.toolbar .ct{font-size:13px;color:var(--text-muted)}

/* Buttons */
.btn-a{padding:7px 14px;border:1px dashed var(--border);border-radius:var(--r);background:none;color:var(--text-sec);font-size:12px;cursor:pointer;font-family:var(--fb);transition:all .2s}
.btn-a:hover{border-color:var(--accent);color:var(--accent-dark)}
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-family:var(--fb);cursor:pointer;border:none;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent-dark)}
.btn-s{background:var(--bg);color:var(--text-sec);border:1px solid var(--border)}
.btn-d{background:none;color:#c06060;border:1px solid #e0b0b0;font-size:11px;padding:5px 10px}
.btn-d:hover{background:#fde8e8}
.btn-e{background:none;color:var(--text-sec);border:1px solid var(--border);font-size:11px;padding:5px 10px}
.btn-e:hover{background:var(--accent-light)}
.act-btns{display:flex;gap:6px;margin-left:auto}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}

/* Card */
.ccard{position:relative;border-radius:var(--rl);overflow:hidden;background:var(--card);border:1px solid var(--border-light);box-shadow:var(--shadow-sm);cursor:pointer;transition:all .3s}
.ccard:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.ccard-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:var(--border-light)}
.ccard-ph{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:48px;background:var(--border-light);color:var(--text-muted)}
.ccard-info{padding:12px 14px}
.ccard-name{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--text)}
.ccard-tags{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
.ccard-tag{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--accent-light);color:var(--accent-dark)}
.ccard-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(61,46,61,.85));padding:60px 14px 14px;opacity:0;transition:opacity .3s;pointer-events:none}
.ccard:hover .ccard-ov{opacity:1}
.ccard-desc{font-size:12px;color:rgba(255,255,255,.9);line-height:1.6;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

/* List items */
.litem{background:var(--card);border:1px solid var(--border-light);border-radius:var(--r);padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:pointer}
.litem:hover{border-color:var(--accent-light);box-shadow:var(--shadow-sm);transform:translateX(3px)}
.litem-main{flex:1;min-width:0}
.litem-title{font-size:14px;font-weight:500;color:var(--text)}
.litem-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.litem .arrow{color:var(--text-muted);font-size:14px;flex-shrink:0}

/* World book entry */
.wb-entry{background:var(--card);border:1px solid var(--border-light);border-radius:var(--rl);margin-bottom:12px;overflow:hidden}
.wb-header{padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .2s}
.wb-header:hover{background:var(--quote-bg)}
.wb-keyword{font-weight:500;font-size:14px;color:var(--text);flex:1}
.wb-toggle{color:var(--text-muted);font-size:12px;transition:transform .2s}
.wb-entry.open .wb-toggle{transform:rotate(90deg)}
.wb-body{display:none;padding:0 18px 16px;font-size:13px;line-height:1.9;color:var(--text-sec);white-space:pre-wrap;word-break:break-word}
.wb-entry.open .wb-body{display:block}

/* Info card (user persona / greeting) - collapsible */
.info-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--rl);margin-bottom:14px;overflow:hidden}
.info-card-hd{padding:14px 18px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .2s;user-select:none}
.info-card-hd:hover{background:var(--quote-bg)}
.info-card-label{font-size:11px;color:var(--text-muted);letter-spacing:1px;flex:1}
.info-card-tog{font-size:11px;color:var(--text-muted);transition:transform .2s}
.info-card.open .info-card-tog{transform:rotate(90deg)}
.info-card-content{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap;word-break:break-word;padding:0 18px 16px;display:none}
.info-card.open .info-card-content{display:block}

/* Segment (forum post) - collapsible */
.seg{background:var(--card);border:1px solid var(--border-light);border-radius:var(--rl);margin-bottom:14px;overflow:hidden}
.seg-header{padding:14px 18px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .2s;user-select:none}
.seg-header:hover{background:var(--quote-bg)}
.seg-title{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--text);flex:1}
.seg-tog{font-size:11px;color:var(--text-muted);transition:transform .2s}
.seg.open .seg-tog{transform:rotate(90deg)}
.seg-body{display:none}
.seg.open .seg-body{display:block}
.seg-date{font-size:11px;color:var(--text-muted)}
.seg-cmt-count{font-size:10px;color:var(--accent);background:var(--accent-light);padding:1px 6px;border-radius:8px}

/* Page nav for segments */
.seg-nav{display:flex;justify-content:center;align-items:center;gap:16px;padding:16px 0;margin:12px 0}
.seg-nav-btn{padding:6px 14px;border-radius:var(--r);background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;font-family:var(--fb);transition:all .2s}
.seg-nav-btn:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent)}
.seg-nav-btn:disabled{opacity:.3;cursor:default}
.seg-nav-info{font-size:12px;color:var(--text-muted)}

/* RP text formatting */
.seg-text{padding:20px 24px;font-size:14px;line-height:2;color:var(--text);white-space:pre-wrap;word-break:break-word;border-bottom:1px solid var(--border-light);background:var(--quote-bg)}
.seg-text .dialogue{color:var(--dialogue-color);font-weight:400}
.seg-text .action{background:var(--action-bg);padding:1px 4px;border-radius:4px;font-style:italic;color:var(--text-sec)}

/* Comments */
.comments{padding:16px 20px}
.comments-header{font-size:12px;color:var(--text-muted);letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.comment{padding:12px 0;border-bottom:1px solid var(--border-light)}
.comment:last-child{border-bottom:none}
.comment-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.comment-floor{font-size:10px;color:var(--accent);font-weight:600;background:var(--accent-light);padding:1px 6px;border-radius:4px}
.comment-author{font-size:12px;font-weight:500;color:var(--text)}
.comment-date{font-size:10px;color:var(--text-muted);margin-left:auto}
.comment-reply{font-size:11px;color:var(--accent-dark);margin-bottom:4px;font-style:italic}
.comment-body{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.comment-actions{margin-top:6px;display:flex;gap:8px}
.comment-actions button{background:none;border:none;font-size:11px;color:var(--text-muted);cursor:pointer;font-family:var(--fb)}
.comment-actions button:hover{color:var(--accent-dark)}

/* Comment input */
.cmt-input{margin-top:12px;display:flex;gap:8px;flex-direction:column}
.cmt-input textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);font-size:13px;font-family:var(--fb);min-height:60px;resize:vertical;outline:none;line-height:1.7;color:var(--text)}
.cmt-input textarea:focus{border-color:var(--accent)}
.cmt-input-bar{display:flex;justify-content:space-between;align-items:center}
.cmt-input-bar select{padding:5px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--card);color:var(--text);font-family:var(--fb)}
.reply-hint{font-size:11px;color:var(--accent-dark);font-style:italic;display:flex;align-items:center;gap:4px}
.reply-hint button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:11px}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(61,46,61,.4);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-bg.on{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);padding:28px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 24px rgba(61,46,61,.12)}
.modal h3{font-family:var(--fd);font-size:18px;font-weight:600;margin-bottom:18px}
.modal label{display:block;font-size:11px;color:var(--text-sec);margin-bottom:4px;letter-spacing:.5px}
.modal input,.modal textarea,.modal select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);font-size:13px;font-family:var(--fb);margin-bottom:12px;outline:none}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{min-height:80px;resize:vertical;line-height:1.7}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

/* File drop */
.fdrop{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:14px;cursor:pointer;transition:all .2s;color:var(--text-muted);font-size:12px}
.fdrop:hover,.fdrop.over{border-color:var(--accent);background:rgba(201,160,201,.05);color:var(--accent-dark)}
.fdrop img{max-height:120px;border-radius:8px;margin-bottom:8px}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty .ic{font-size:48px;margin-bottom:16px;opacity:.5}
.empty p{font-size:14px}

@media(max-width:640px){
  .hdr{padding:28px 16px 16px}.hdr h1{font-size:22px}
  .main{padding:0 16px 40px}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .seg-text{padding:16px}.comments{padding:12px 16px}
  .modal{padding:20px 16px}
}
</style>
</head>
<body>

<header class="hdr">
  <a href="../index.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 19l-7-7 7-7"/></svg>回到小窝</a>
  <div class="hdr-center">
    <h1><em>小羊</em>的房间</h1>
    <div class="sub">YANG'S ROOM</div>
  </div>
  <div style="width:60px"></div>
</header>

<main class="main">
  <!-- V1: Gallery -->
  <div id="v-gallery" class="v on">
    <div class="toolbar"><span class="ct" id="charCt"></span><button class="btn-a" onclick="openModal('char')">+ 新角色卡</button></div>
    <div class="grid" id="charGrid"></div>
  </div>

  <!-- V2: Character Detail -->
  <div id="v-char" class="v">
    <div class="crumb" id="charCrumb"></div>
    <div id="charHeader"></div>
    <div class="toolbar" style="margin-top:20px">
      <div style="display:flex;gap:0;border-bottom:1px solid var(--border-light);flex:1" id="charTabs"></div>
    </div>
    <div id="charPanels"></div>
  </div>

  <!-- V3: Archive Detail -->
  <div id="v-archive" class="v">
    <div class="crumb" id="archCrumb"></div>
    <div id="archInfo"></div>
    <div style="margin-top:16px"><span class="ct" id="segCt" style="font-size:12px;color:var(--text-muted)"></span></div>
    <div id="segList"></div>
    <div id="segNav"></div>
    <div style="text-align:center;margin-top:12px"><button class="btn-a" onclick="openModal('seg')">+ 精选段落</button></div>
  </div>
</main>

<!-- Universal Modal -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

<script>
const A='https://love-nest-api.zeabur.app';
let chars=[],curChar=null,curArch=null,replyTo=null;

// ===== Navigation =====
function go(v){document.querySelectorAll('.v').forEach(e=>e.classList.remove('on'));document.getElementById('v-'+v).classList.add('on');window.scrollTo({top:0,behavior:'smooth'})}

// ===== Utils =====
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function fmtRP(text){
  let s=esc(text);
  // **action** → styled span
  s=s.replace(/\*\*([^*]+)\*\*/g,'<span class="action">$1</span>');
  s=s.replace(/\*([^*]+)\*/g,'<span class="action">$1</span>');
  // "dialogue" → colored
  s=s.replace(/「([^」]+)」/g,'<span class="dialogue">「$1」</span>');
  s=s.replace(/&quot;([^&]+)&quot;/g,'<span class="dialogue">"$1"</span>');
  s=s.replace(/"([^"]+)"/g,'<span class="dialogue">"$1"</span>');
  return s;
}

async function api(path,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(A+path,opts);
  return r.json();
}

// ===== Modal =====
function openModal(type,data){
  const m=document.getElementById('modalContent');
  const bg=document.getElementById('modalBg');
  let html='';
  switch(type){
    case 'char':
      html=`<h3>${data?'编辑':'新建'}角色卡</h3>
        <div class="fdrop" id="imgDrop">${data&&data.image?`<img src="${data.image.startsWith('/')?A:''}${data.image}"><br>点击更换`:'点击或拖拽角色卡图片'}<input type="file" accept="image/*" id="imgIn" style="display:none"></div>
        <label>角色名</label><input id="f-name" value="${esc(data?.name||'')}">
        <label>简介</label><textarea id="f-desc">${esc(data?.description||'')}</textarea>
        <label>标签（逗号分隔）</label><input id="f-tags" value="${(data?.tags||[]).join(', ')}">
        <div class="modal-btns">${data?'<button class="btn btn-d" onclick="delChar(\''+data.id+'\')">删除</button>':''}<button class="btn btn-s" onclick="closeModal()">取消</button><button class="btn btn-p" onclick="saveChar('${data?.id||''}')">保存</button></div>`;
      break;
    case 'wb':
      html=`<h3>${data?'编辑':'新建'}世界书条目</h3>
        <label>关键词</label><input id="f-kw" value="${esc(data?.keyword||'')}">
        <label>内容</label><textarea id="f-wbc" style="min-height:150px">${esc(data?.content||'')}</textarea>
        <div class="modal-btns">${data?'<button class="btn btn-d" onclick="delWb(\''+data.id+'\')">删除</button>':''}<button class="btn btn-s" onclick="closeModal()">取消</button><button class="btn btn-p" onclick="saveWb('${data?.id||''}')">保存</button></div>`;
      break;
    case 'arch':
      html=`<h3>${data?'编辑':'新建'}存档</h3>
        <label>标题</label><input id="f-atitle" value="${esc(data?.title||'')}">
        <label>User 设定</label><textarea id="f-up" style="min-height:100px">${esc(data?.userPersona||'')}</textarea>
        <label>开场白</label><textarea id="f-greet" style="min-height:100px">${esc(data?.greeting||'')}</textarea>
        <div class="modal-btns">${data?'<button class="btn btn-d" onclick="delArch(\''+data.id+'\')">删除</button>':''}<button class="btn btn-s" onclick="closeModal()">取消</button><button class="btn btn-p" onclick="saveArch('${data?.id||''}')">保存</button></div>`;
      break;
    case 'seg':
      html=`<h3>${data?'编辑':'新建'}精选段落</h3>
        <label>标题</label><input id="f-stitle" value="${esc(data?.title||'')}">
        <label>RP文本</label><textarea id="f-scontent" style="min-height:200px" placeholder="粘贴RP段落。\n&quot;对话&quot; 会变色，**动作** 会加底纹">${esc(data?.content||'')}</textarea>
        <div class="modal-btns">${data?'<button class="btn btn-d" onclick="delSeg(\''+data.id+'\')">删除</button>':''}<button class="btn btn-s" onclick="closeModal()">取消</button><button class="btn btn-p" onclick="saveSeg('${data?.id||''}')">保存</button></div>`;
      break;
  }
  m.innerHTML=html;
  bg.classList.add('on');
  // Image drop setup
  if(type==='char')setupImg(data);
}
function closeModal(){document.getElementById('modalBg').classList.remove('on')}

let imgB64='';
function setupImg(data){
  imgB64=data?.image||'';
  const drop=document.getElementById('imgDrop'),inp=document.getElementById('imgIn');
  if(!drop||!inp)return;
  drop.onclick=()=>inp.click();
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
  drop.ondragleave=()=>drop.classList.remove('over');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');readImg(e.dataTransfer.files[0])};
  inp.onchange=()=>{if(inp.files[0])readImg(inp.files[0])};
}
function readImg(f){
  if(!f||!f.type.startsWith('image/'))return;
  const r=new FileReader();
  r.onload=e=>{imgB64=e.target.result;const d=document.getElementById('imgDrop');d.innerHTML=`<img src="${imgB64}"><br>点击更换<input type="file" accept="image/*" id="imgIn" style="display:none">`;setupImg({image:imgB64})};
  r.readAsDataURL(f);
}

// ===== Characters =====
async function loadGallery(){
  const g=document.getElementById('charGrid'),ct=document.getElementById('charCt');
  try{
    chars=await api('/rooms/yang/characters');
    ct.textContent=chars.length?chars.length+' 张角色卡':'';
    if(!chars.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ic">🐑</div><p>还没有角色卡</p></div>';return}
    g.innerHTML=chars.map(c=>`
      <div class="ccard" onclick="openChar('${c.id}')">
        ${c.image?`<img class="ccard-img" src="${c.image.startsWith('data:')||c.image.startsWith('http')?'':A}${c.image}" onerror="this.outerHTML='<div class=ccard-ph>🎭</div>'">`:'<div class="ccard-ph">🎭</div>'}
        <div class="ccard-info"><div class="ccard-name">${esc(c.name)}</div>
        ${c.tags?.length?'<div class="ccard-tags">'+c.tags.slice(0,3).map(t=>'<span class="ccard-tag">'+esc(t)+'</span>').join('')+'</div>':''}</div>
        ${c.description?'<div class="ccard-ov"><div class="ccard-desc">'+esc(c.description)+'</div></div>':''}
      </div>`).join('');
  }catch(e){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ic">🐑</div><p>后端暂未就绪</p></div>'}
}

async function saveChar(id){
  const name=document.getElementById('f-name').value.trim();
  if(!name)return alert('请输入角色名');
  const body={name,description:document.getElementById('f-desc').value.trim(),tags:document.getElementById('f-tags').value.split(',').map(s=>s.trim()).filter(Boolean)};
  if(imgB64&&imgB64.startsWith('data:'))body.image=imgB64;
  if(id){await api('/rooms/yang/characters/'+id,'PUT',body)}
  else{const r=await api('/rooms/yang/characters','POST',body);if(r.char&&imgB64&&imgB64.startsWith('data:'))body.image=imgB64}
  closeModal();loadGallery();
}

async function delChar(id){
  if(!confirm('确定删除这个角色卡？相关世界书和存档都会删除。'))return;
  await api('/rooms/yang/characters/'+id,'DELETE');
  closeModal();go('gallery');loadGallery();
}

// ===== Character Detail =====
async function openChar(id){
  curChar=chars.find(c=>c.id===id);if(!curChar)return;
  // Crumb
  document.getElementById('charCrumb').innerHTML=`<span onclick="go('gallery')">画廊</span><span class="sep">›</span><span class="cur">${esc(curChar.name)}</span><div class="act-btns"><button class="btn-e" onclick="openModal('char',curChar)">编辑</button></div>`;
  // Header
  document.getElementById('charHeader').innerHTML=`
    <div style="display:flex;gap:20px;align-items:flex-start">
      ${curChar.image?`<img style="width:120px;height:160px;border-radius:var(--rl);object-fit:cover;border:1px solid var(--border-light);box-shadow:var(--shadow-md)" src="${curChar.image.startsWith('data:')||curChar.image.startsWith('http')?'':A}${curChar.image}" onerror="this.style.display='none'">`:''}
      <div style="flex:1"><div style="font-family:var(--fd);font-size:22px;font-weight:600">${esc(curChar.name)}</div>
      ${curChar.description?'<div style="font-size:13px;color:var(--text-sec);margin-top:6px;line-height:1.8">'+esc(curChar.description)+'</div>':''}
      ${curChar.tags?.length?'<div class="ccard-tags" style="margin-top:8px">'+curChar.tags.map(t=>'<span class="ccard-tag">'+esc(t)+'</span>').join('')+'</div>':''}</div>
    </div>`;
  // Tabs
  const tabs=document.getElementById('charTabs');
  tabs.innerHTML=['世界书','存档'].map((t,i)=>`<button class="tab-btn${i===0?' active':''}" onclick="switchCharTab(${i},this)" style="padding:10px 20px;font-size:13px;color:${i===0?'var(--text)':'var(--text-muted)'};background:none;border:none;cursor:pointer;position:relative;font-family:var(--fb);letter-spacing:.5px;font-weight:${i===0?'500':'400'}">${t}</button>`).join('');
  const panels=document.getElementById('charPanels');
  panels.innerHTML='<div id="p-wb"></div><div id="p-arch" style="display:none"></div>';
  await loadWb();await loadArchives();
  go('char');
}

function switchCharTab(i,btn){
  document.querySelectorAll('#charTabs button').forEach((b,j)=>{b.style.color=j===i?'var(--text)':'var(--text-muted)';b.style.fontWeight=j===i?'500':'400'});
  document.getElementById('p-wb').style.display=i===0?'block':'none';
  document.getElementById('p-arch').style.display=i===1?'block':'none';
}

// ===== World Book =====
async function loadWb(){
  const p=document.getElementById('p-wb');
  try{
    const entries=await api(`/rooms/yang/characters/${curChar.id}/worldbook`);
    p.innerHTML=`<div class="toolbar"><span class="ct">${entries.length} 条目</span><button class="btn-a" onclick="openModal('wb')">+ 条目</button></div>`+
      (entries.length?entries.map(e=>`
        <div class="wb-entry" id="wb-${e.id}">
          <div class="wb-header" onclick="document.getElementById('wb-${e.id}').classList.toggle('open')">
            <span class="wb-keyword">${esc(e.keyword)}</span>
            <div class="act-btns"><button class="btn-e" onclick="event.stopPropagation();openModal('wb',${JSON.stringify(e).replace(/"/g,'&quot;')})">编辑</button></div>
            <span class="wb-toggle">›</span>
          </div>
          <div class="wb-body">${esc(e.content)}</div>
        </div>`).join(''):'<div class="empty"><p>还没有世界书条目</p></div>');
  }catch(e){p.innerHTML='<div class="empty"><p>加载失败</p></div>'}
}

async function saveWb(id){
  const kw=document.getElementById('f-kw').value.trim();
  if(!kw)return alert('请输入关键词');
  const body={keyword:kw,content:document.getElementById('f-wbc').value};
  if(id)await api(`/rooms/yang/characters/${curChar.id}/worldbook/${id}`,'PUT',body);
  else await api(`/rooms/yang/characters/${curChar.id}/worldbook`,'POST',body);
  closeModal();loadWb();
}

async function delWb(id){
  if(!confirm('删除这个条目？'))return;
  await api(`/rooms/yang/characters/${curChar.id}/worldbook/${id}`,'DELETE');
  closeModal();loadWb();
}

// ===== Archives =====
async function loadArchives(){
  const p=document.getElementById('p-arch');
  try{
    const archs=await api(`/rooms/yang/characters/${curChar.id}/archives`);
    p.innerHTML=`<div class="toolbar"><span class="ct">${archs.length} 个存档</span><button class="btn-a" onclick="openModal('arch')">+ 存档</button></div>`+
      (archs.length?archs.map(a=>`
        <div class="litem" onclick="openArchive('${a.id}')">
          <div class="litem-main"><div class="litem-title">${esc(a.title)}</div><div class="litem-meta">${a.segmentCount||0} 个段落</div></div>
          <div class="act-btns"><button class="btn-e" onclick="event.stopPropagation();editArch('${a.id}')">编辑</button></div>
          <span class="arrow">→</span>
        </div>`).join(''):'<div class="empty"><p>还没有存档</p></div>');
  }catch(e){p.innerHTML='<div class="empty"><p>加载失败</p></div>'}
}

async function saveArch(id){
  const title=document.getElementById('f-atitle').value.trim();
  if(!title)return alert('请输入标题');
  const body={title,userPersona:document.getElementById('f-up').value,greeting:document.getElementById('f-greet').value};
  if(id)await api(`/rooms/yang/characters/${curChar.id}/archives/${id}`,'PUT',body);
  else await api(`/rooms/yang/characters/${curChar.id}/archives`,'POST',body);
  closeModal();loadArchives();
}

async function editArch(id){
  const arch=await api(`/rooms/yang/characters/${curChar.id}/archives/${id}`);
  openModal('arch',arch);
}

async function delArch(id){
  if(!confirm('删除这个存档？'))return;
  await api(`/rooms/yang/characters/${curChar.id}/archives/${id}`,'DELETE');
  closeModal();loadArchives();
}

// ===== Archive Detail =====
let segPage=1;
const SEG_PER_PAGE=10;

async function openArchive(id,opts){
  const noScroll=opts&&opts.noScroll;
  try{
    curArch=await api(`/rooms/yang/characters/${curChar.id}/archives/${id}`);
    document.getElementById('archCrumb').innerHTML=`<span onclick="go('gallery')">画廊</span><span class="sep">›</span><span onclick="openChar('${curChar.id}')">${esc(curChar.name)}</span><span class="sep">›</span><span class="cur">${esc(curArch.title)}</span><div class="act-btns"><button class="btn-e" onclick="editArch('${curArch.id}')">编辑</button></div>`;
    // Collapsible info cards
    let info='';
    if(curArch.userPersona){info+=`<div class="info-card" id="ic-up"><div class="info-card-hd" onclick="document.getElementById('ic-up').classList.toggle('open')"><span class="info-card-label">👤 User 设定</span><span class="info-card-tog">›</span></div><div class="info-card-content">${esc(curArch.userPersona)}</div></div>`}
    if(curArch.greeting){info+=`<div class="info-card" id="ic-gr"><div class="info-card-hd" onclick="document.getElementById('ic-gr').classList.toggle('open')"><span class="info-card-label">💬 开场白</span><span class="info-card-tog">›</span></div><div class="info-card-content">${fmtRP(curArch.greeting)}</div></div>`}
    document.getElementById('archInfo').innerHTML=info;
    // Segments with pagination
    const segs=curArch.segments||[];
    const total=segs.length;
    document.getElementById('segCt').textContent=total?total+' 个段落':'';
    if(!total){document.getElementById('segList').innerHTML='<div class="empty"><p>还没有精选段落</p></div>';document.getElementById('segNav').innerHTML='';if(!noScroll)go('archive');return}
    // Clamp page
    const totalPages=Math.ceil(total/SEG_PER_PAGE);
    if(segPage>totalPages)segPage=totalPages;
    if(segPage<1)segPage=1;
    const start=(segPage-1)*SEG_PER_PAGE;
    const pageSegs=segs.slice(start,start+SEG_PER_PAGE);
    const lastIdx=start+pageSegs.length-1; // index of last segment on this page

    document.getElementById('segList').innerHTML=pageSegs.map((s,i)=>{
      const globalIdx=start+i;
      const isLast=globalIdx===segs.length-1; // newest segment (last in array)
      const cmts=s.comments||[];
      return`<div class="seg${isLast?' open':''}" id="seg-${s.id}">
        <div class="seg-header" onclick="document.getElementById('seg-${s.id}').classList.toggle('open')">
          <div class="seg-title">${esc(s.title)}</div>
          ${cmts.length?`<span class="seg-cmt-count">💬${cmts.length}</span>`:''}
          <div class="act-btns"><button class="btn-e" onclick="event.stopPropagation();openModal('seg',${JSON.stringify({id:s.id,title:s.title,content:s.content}).replace(/"/g,'&quot;')})">编辑</button><button class="btn-d" onclick="event.stopPropagation();delSeg('${s.id}')">删除</button></div>
          <span class="seg-tog">›</span>
        </div>
        <div class="seg-body">
          <div class="seg-text">${fmtRP(s.content)}</div>
          <div class="comments">
            <div class="comments-header">💬 评论 (${cmts.length})</div>
            ${cmts.map(c=>`<div class="comment" id="cmt-${c.id}">
              <div class="comment-head">
                <span class="comment-floor">#${c.floor}</span>
                <span class="comment-author">${esc(c.author)}</span>
                <span class="comment-date">${(c.created||'').slice(0,10)}</span>
              </div>
              ${c.replyTo?'<div class="comment-reply">回复 #'+c.replyTo+'</div>':''}
              <div class="comment-body">${esc(c.content)}</div>
              <div class="comment-actions">
                <button onclick="setReply('${s.id}',${c.floor})">回复</button>
                <button onclick="delComment('${s.id}','${c.id}')">删除</button>
              </div>
            </div>`).join('')}
            <div class="cmt-input" id="cmtin-${s.id}">
              <div class="reply-hint" id="rh-${s.id}" style="display:none">回复 <span id="rt-${s.id}"></span> <button onclick="clearReply('${s.id}')">✕</button></div>
              <textarea id="cmttext-${s.id}" placeholder="写评论..."></textarea>
              <div class="cmt-input-bar">
                <select id="cmtauthor-${s.id}"><option value="小羊">小羊</option><option value="暮">暮</option></select>
                <button class="btn btn-p" onclick="postComment('${s.id}')" style="padding:6px 14px;font-size:12px">发布</button>
              </div>
            </div>
          </div>
        </div>
      </div>`}).join('');

    // Pagination
    const nav=document.getElementById('segNav');
    if(totalPages>1){
      nav.innerHTML=`<div class="seg-nav">
        <button class="seg-nav-btn" onclick="segPage--;openArchive('${curArch.id}',{noScroll:false})" ${segPage<=1?'disabled':''}>← 上一页</button>
        <span class="seg-nav-info">${segPage} / ${totalPages}</span>
        <button class="seg-nav-btn" onclick="segPage++;openArchive('${curArch.id}',{noScroll:false})" ${segPage>=totalPages?'disabled':''}>下一页 →</button>
      </div>`;
    }else{nav.innerHTML=''}

    if(!noScroll)go('archive');
  }catch(e){console.error(e)}
  }catch(e){console.error(e)}
}

// ===== Segments CRUD =====
async function saveSeg(id){
  const title=document.getElementById('f-stitle').value.trim();
  const content=document.getElementById('f-scontent').value;
  if(!content)return alert('请粘贴RP文本');
  const body={title:title||undefined,content};
  if(id)await api(`/rooms/yang/characters/${curChar.id}/archives/${curArch.id}/segments/${id}`,'PUT',body);
  else{await api(`/rooms/yang/characters/${curChar.id}/archives/${curArch.id}/segments`,'POST',body);
    // Jump to last page for new segment
    const arch=await api(`/rooms/yang/characters/${curChar.id}/archives/${curArch.id}`);
    segPage=Math.ceil((arch.segments||[]).length/SEG_PER_PAGE);
  }
  closeModal();openArchive(curArch.id,{noScroll:true});
}

async function delSeg(id){
  if(!confirm('删除这个段落？'))return;
  await api(`/rooms/yang/characters/${curChar.id}/archives/${curArch.id}/segments/${id}`,'DELETE');
  openArchive(curArch.id,{noScroll:true});
}

// ===== Comments =====
function setReply(sid,floor){
  replyTo=floor;
  document.getElementById('rh-'+sid).style.display='flex';
  document.getElementById('rt-'+sid).textContent='#'+floor;
  document.getElementById('cmttext-'+sid).focus();
}
function clearReply(sid){
  replyTo=null;
  document.getElementById('rh-'+sid).style.display='none';
}

async function postComment(sid){
  const text=document.getElementById('cmttext-'+sid).value.trim();
  const author=document.getElementById('cmtauthor-'+sid).value;
  if(!text)return;
  const body={author,content:text};
  if(replyTo)body.replyTo=replyTo;
  await api(`/rooms/yang/characters/${curChar.id}/archives/${curArch.id}/segments/${sid}/comments`,'POST',body);
  replyTo=null;
  openArchive(curArch.id,{noScroll:true});
}

async function delComment(sid,cid){
  if(!confirm('删除这条评论？'))return;
  await api(`/rooms/yang/characters/${curChar.id}/archives/${curArch.id}/segments/${sid}/comments/${cid}`,'DELETE');
  openArchive(curArch.id,{noScroll:true});
}

// ===== Init =====
loadGallery();
</script>
