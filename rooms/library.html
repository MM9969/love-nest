<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共读书房 · Love Nest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f1;--bg-warm:#f7faf7;--card:#fcfffc;
  --border:#d5e0d5;--border-light:#e5efe5;
  --text:#2e3d2e;--text-sec:#6a8a6a;--text-muted:#9ab59a;
  --accent:#8ab4a0;--accent-light:#c5e0d5;--accent-dark:#5e8a70;
  --yang-color:#d4849e;--yang-bg:#fdf0f4;--yang-border:#f0c8d8;
  --mu-color:#7a9ab4;--mu-bg:#f0f4fa;--mu-border:#c0d0e0;
  --gold:#d4a574;--gold-light:#f0dcc0;
  --shadow-sm:0 1px 3px rgba(46,61,46,.06);--shadow-md:0 4px 12px rgba(46,61,46,.08);
  --r:12px;--rl:18px;
  --fd:'Cormorant Garamond','Noto Serif SC',serif;
  --fb:'Noto Sans SC',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;font-weight:300;line-height:1.7}

.hdr{padding:32px 32px 20px;max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:16px}
.back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-sec);font-size:13px;transition:color .3s}
.back:hover{color:var(--accent-dark)}
.back svg{width:16px;height:16px}
.hdr-c{flex:1;text-align:center}
.hdr h1{font-family:var(--fd);font-size:26px;font-weight:400;letter-spacing:2px}
.hdr h1 em{font-style:italic;color:var(--accent-dark)}
.hdr .sub{font-size:11px;color:var(--text-muted);letter-spacing:3px;margin-top:3px}

.main{max-width:1000px;margin:0 auto;padding:0 32px 60px}
.v{display:none}.v.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Bookshelf */
.shelf-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.shelf-ct{font-size:13px;color:var(--text-muted)}
.btn-a{padding:7px 14px;border:1px dashed var(--border);border-radius:var(--r);background:none;color:var(--text-sec);font-size:12px;cursor:pointer;font-family:var(--fb);transition:all .2s}
.btn-a:hover{border-color:var(--accent);color:var(--accent-dark)}

.shelf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px}
.book-card{cursor:pointer;transition:transform .3s;text-align:center}
.book-card:hover{transform:translateY(-6px)}
.book-cover{width:100%;aspect-ratio:3/4.2;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-md);margin-bottom:10px;position:relative;background:var(--card);border:1px solid var(--border-light)}
.book-cover img{width:100%;height:100%;object-fit:cover}
.book-cover-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f0e8,#d0e0d0);padding:16px}
.book-cover-ph .t-ph{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--text);text-align:center;word-break:break-all}
.book-cover-ph .a-ph{font-size:10px;color:var(--text-muted);margin-top:4px}
.book-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.1)}
.book-progress-fill{height:100%;background:var(--accent);transition:width .3s}
.book-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.book-author{font-size:11px;color:var(--text-muted)}
.book-meta{font-size:10px;color:var(--text-muted);margin-top:2px}

/* Book Detail (chapters list) */
.detail-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.detail-bar .back-btn{background:none;border:none;font-size:13px;color:var(--text-sec);cursor:pointer;font-family:var(--fb)}
.detail-bar .back-btn:hover{color:var(--accent-dark)}
.detail-info{display:flex;gap:16px;margin-bottom:20px;align-items:flex-start}
.detail-cover{width:100px;aspect-ratio:3/4.2;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-md);flex-shrink:0}
.detail-cover img{width:100%;height:100%;object-fit:cover}
.detail-meta{flex:1}
.detail-meta h2{font-family:var(--fd);font-size:22px;font-weight:600;margin-bottom:4px}
.detail-meta .author{font-size:13px;color:var(--text-sec);margin-bottom:8px}
.detail-meta .stats{font-size:12px;color:var(--text-muted)}
.detail-actions{display:flex;gap:8px;margin-top:10px}
.btn-e{padding:5px 10px;border:1px solid var(--border);border-radius:var(--r);background:none;color:var(--text-sec);font-size:11px;cursor:pointer;font-family:var(--fb)}
.btn-e:hover{background:var(--accent-light)}
.btn-d{padding:5px 10px;border:1px solid #e0b0b0;border-radius:var(--r);background:none;color:#c06060;font-size:11px;cursor:pointer;font-family:var(--fb)}

.ch-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ch-list-title{font-size:14px;font-weight:500;color:var(--text)}
.ch-item{background:var(--card);border:1px solid var(--border-light);border-radius:var(--r);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.ch-item:hover{border-color:var(--accent-light);transform:translateX(3px)}
.ch-num{font-size:11px;color:var(--text-muted);min-width:24px}
.ch-title{flex:1;font-size:13px;color:var(--text)}
.ch-meta{font-size:10px;color:var(--text-muted)}
.ch-arrow{color:var(--text-muted);font-size:12px}

/* Reader */
.reader-bar{display:flex;align-items:center;gap:12px;padding:10px 0;margin-bottom:12px;border-bottom:1px solid var(--border-light)}
.reader-bar .back-btn{background:none;border:none;font-size:13px;color:var(--text-sec);cursor:pointer;font-family:var(--fb)}
.reader-bar .info{flex:1;text-align:center}
.reader-bar .info .t{font-family:var(--fd);font-size:15px;font-weight:600}
.reader-bar .info .ch{font-size:11px;color:var(--text-muted)}
.reader-bar .pg{font-size:11px;color:var(--text-muted)}

.type-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:11px;color:var(--text-muted)}
.type-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px}

.reader-content{max-width:720px;margin:0 auto}
.para-wrap{position:relative;padding:6px 0 6px 18px;margin-bottom:2px;border-left:3px solid transparent;transition:all .2s;cursor:pointer;border-radius:0 6px 6px 0}
.para-wrap:hover{background:rgba(138,180,160,.06)}
.para-wrap.has-ann{border-left-color:var(--gold)}
.para-wrap.active{background:rgba(138,180,160,.1);border-left-color:var(--accent)}
.para-text{font-size:15px;line-height:2;color:var(--text);text-indent:2em}
.para-idx{position:absolute;left:-28px;top:8px;font-size:9px;color:var(--text-muted);opacity:0;transition:opacity .2s;width:24px;text-align:right}
.para-wrap:hover .para-idx{opacity:1}

.ann-list{padding:8px 0 8px 12px;display:flex;flex-direction:column;gap:6px}
.ann-bubble{padding:8px 14px;border-radius:12px;font-size:13px;line-height:1.7;max-width:85%;position:relative;word-break:break-word}
.ann-bubble.yang{background:var(--yang-bg);border:1px solid var(--yang-border);color:#6a3048;align-self:flex-start}
.ann-bubble.mu{background:var(--mu-bg);border:1px solid var(--mu-border);color:#3a4a6a;align-self:flex-end}
.ann-author{font-size:10px;font-weight:500;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.ann-bubble.yang .ann-author{color:var(--yang-color)}
.ann-bubble.mu .ann-author{color:var(--mu-color)}
.ann-type{font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(0,0,0,.06)}
.ann-text{white-space:pre-wrap}
.ann-del{position:absolute;top:6px;right:8px;background:none;border:none;font-size:10px;color:var(--text-muted);cursor:pointer;opacity:0;transition:opacity .2s}
.ann-bubble:hover .ann-del{opacity:1}

.ann-input{margin-top:8px;padding:12px 16px;background:var(--card);border:1px solid var(--border-light);border-radius:var(--rl);display:none}
.ann-input.on{display:block;animation:fi .2s ease}
.ann-input textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--fb);min-height:50px;resize:vertical;outline:none;color:var(--text);line-height:1.6;background:var(--bg-warm)}
.ann-input textarea:focus{border-color:var(--accent)}
.ann-input-bar{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.ann-input-bar select{padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:var(--card);font-family:var(--fb);color:var(--text)}
.btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-family:var(--fb);cursor:pointer;border:none;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent-dark)}
.btn-s{background:var(--bg);color:var(--text-sec);border:1px solid var(--border)}

/* Page & chapter nav */
.nav-bar{display:flex;justify-content:center;align-items:center;gap:16px;padding:24px 0;margin-top:16px;border-top:1px solid var(--border-light);flex-wrap:wrap}
.nav-btn{padding:8px 18px;border-radius:var(--r);background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;font-family:var(--fb);transition:all .2s}
.nav-btn:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn.ch-btn{background:var(--accent-light);border-color:var(--accent);font-weight:500}
.nav-info{font-size:13px;color:var(--text);font-weight:500;min-width:80px;text-align:center}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(46,61,46,.4);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-bg.on{display:flex}
.modal{background:var(--bg-warm);border-radius:var(--rl);padding:28px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 24px rgba(46,61,46,.12)}
.modal h3{font-family:var(--fd);font-size:18px;font-weight:600;margin-bottom:16px}
.modal label{display:block;font-size:11px;color:var(--text-sec);margin-bottom:4px;letter-spacing:.5px}
.modal input,.modal textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);font-size:13px;font-family:var(--fb);margin-bottom:12px;outline:none}
.modal textarea{min-height:80px;resize:vertical;line-height:1.7}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

.fdrop{border:2px dashed var(--border);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:14px;cursor:pointer;transition:all .2s;color:var(--text-muted);font-size:12px}
.fdrop:hover,.fdrop.over{border-color:var(--accent);background:rgba(138,180,160,.05)}
.fdrop img{max-height:100px;border-radius:8px;margin-bottom:6px}
.hint{font-size:11px;color:var(--text-muted);margin-bottom:10px;line-height:1.5}

.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty .ic{font-size:48px;margin-bottom:16px;opacity:.5}

@media(max-width:640px){
  .hdr{padding:24px 16px 16px}.hdr h1{font-size:22px}
  .main{padding:0 16px 40px}
  .shelf-grid{grid-template-columns:repeat(3,1fr);gap:12px}
  .detail-info{flex-direction:column;align-items:center;text-align:center}
  .para-text{font-size:14px;text-indent:1.5em}.para-idx{display:none}
}
</style>
</head>
<body>

<header class="hdr">
  <a href="study.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 19l-7-7 7-7"/></svg>书房</a>
  <div class="hdr-c"><h1><em>共读</em>书房</h1><div class="sub">READ TOGETHER</div></div>
  <div style="width:60px"></div>
</header>

<main class="main">
  <!-- V1: Bookshelf -->
  <div id="v-shelf" class="v on">
    <div class="shelf-toolbar"><span class="shelf-ct" id="shelfCt"></span><button class="btn-a" onclick="openBookModal()">+ 新书</button></div>
    <div class="shelf-grid" id="shelfGrid"></div>
  </div>

  <!-- V2: Book Detail (chapters) -->
  <div id="v-detail" class="v">
    <div class="detail-bar"><button class="back-btn" onclick="goShelf()">← 书架</button></div>
    <div class="detail-info" id="detailInfo"></div>
    <div class="ch-list-header"><span class="ch-list-title" id="chListTitle"></span><button class="btn-a" onclick="openChModal()">+ 添加章节</button></div>
    <div id="chList"></div>
  </div>

  <!-- V3: Reader -->
  <div id="v-reader" class="v">
    <div class="reader-bar">
      <button class="back-btn" onclick="goDetail()">← 目录</button>
      <div class="info"><div class="t" id="rTitle"></div><div class="ch" id="rChapter"></div></div>
      <div class="pg" id="rPage"></div>
    </div>
    <div class="type-legend">
      <span><span class="type-dot" style="background:var(--yang-color)"></span>小羊</span>
      <span><span class="type-dot" style="background:var(--mu-color)"></span>暮</span>
      <span style="margin-left:6px">💬评论 ✨好句 🔍分析 🔮伏笔 🗯️吐槽</span>
    </div>
    <div class="reader-content" id="rContent"></div>
    <div class="nav-bar" id="navBar"></div>
  </div>
</main>

<!-- Book Modal -->
<div class="modal-bg" id="bookModal"><div class="modal">
  <h3 id="bmH">新书上架</h3>
  <div class="fdrop" id="coverDrop">点击或拖拽封面图片<input type="file" accept="image/*" id="coverIn" style="display:none"></div>
  <label>书名</label><input id="f-title" placeholder="书名">
  <label>作者</label><input id="f-author" placeholder="作者（可选）">
  <div class="modal-btns">
    <button class="btn-d" id="bmDel" style="display:none" onclick="delBook()">删除</button>
    <button class="btn btn-s" onclick="closeModals()">取消</button>
    <button class="btn btn-p" onclick="saveBook()">上架</button>
  </div>
</div></div>

<!-- Chapter Modal -->
<div class="modal-bg" id="chModal"><div class="modal">
  <h3 id="cmH">添加章节</h3>
  <label>章节标题</label><input id="f-chtitle" placeholder="第X章 标题">
  <label>正文内容</label>
  <div class="hint">粘贴本章文本，或拖拽 .txt 文件。按段落自动分割。</div>
  <div class="fdrop" id="txtDrop">拖拽 .txt 文件<input type="file" accept=".txt,.text" id="txtIn" style="display:none"></div>
  <textarea id="f-chcontent" placeholder="粘贴文本..." style="min-height:140px;font-size:12px"></textarea>
  <div class="modal-btns">
    <button class="btn btn-s" onclick="closeModals()">取消</button>
    <button class="btn btn-p" onclick="saveCh()">保存</button>
  </div>
</div></div>

<script>
const A='https://love-nest-api.zeabur.app';
let books=[],curBook=null,curCh=0,curPage=1,coverB64='',editBookId=null,editChIdx=null;
const TE={comment:'💬',quote:'✨',analysis:'🔍',foreshadow:'🔮',roast:'🗯️'};
const TL={comment:'评论',quote:'好句',analysis:'分析',foreshadow:'伏笔',roast:'吐槽'};

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
async function api(p,m='GET',b=null){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);return(await fetch(A+p,o)).json()}
function go(v){document.querySelectorAll('.v').forEach(e=>e.classList.remove('on'));document.getElementById('v-'+v).classList.add('on');window.scrollTo({top:0})}
function goShelf(){go('shelf');loadShelf()}
function goDetail(){go('detail');loadDetail()}
function closeModals(){document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('on'))}

// ===== Bookshelf =====
async function loadShelf(){
  const g=document.getElementById('shelfGrid'),ct=document.getElementById('shelfCt');
  try{
    books=await api('/rooms/study/library');
    ct.textContent=books.length?books.length+' 本':'';
    if(!books.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ic">📚</div><p>书架空空的</p><p style="font-size:12px;margin-top:8px">点击「+ 新书」上架第一本</p></div>';return}
    g.innerHTML=books.map(b=>{
      const prog=b.progress||{chapter:0,page:1};
      const pct=b.chapterCount?(Math.round(prog.chapter/b.chapterCount*100)):0;
      return`<div class="book-card" onclick="openBook('${b.id}')">
        <div class="book-cover">
          ${b.cover?`<img src="${b.cover}" onerror="this.parentElement.innerHTML='<div class=book-cover-ph><div class=t-ph>${esc(b.title)}</div><div class=a-ph>${esc(b.author)}</div></div>'">`
          :`<div class="book-cover-ph"><div class="t-ph">${esc(b.title)}</div><div class="a-ph">${esc(b.author)}</div></div>`}
          <div class="book-progress"><div class="book-progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="book-title">${esc(b.title)}</div>
        ${b.author?`<div class="book-author">${esc(b.author)}</div>`:''}
        <div class="book-meta">${b.chapterCount}章 · ${b.totalParagraphs}段</div>
      </div>`}).join('');
  }catch(e){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ic">📚</div><p>后端暂未就绪</p></div>'}
}

// ===== Book Modal =====
function openBookModal(b){
  editBookId=b?b.id:null;coverB64=b?.cover||'';
  document.getElementById('bmH').textContent=b?'编辑书籍':'新书上架';
  document.getElementById('bmDel').style.display=b?'inline-block':'none';
  document.getElementById('f-title').value=b?.title||'';
  document.getElementById('f-author').value=b?.author||'';
  const cd=document.getElementById('coverDrop');
  cd.innerHTML=(b&&b.cover?`<img src="${b.cover}"><br>点击更换`:'点击或拖拽封面图片')+'<input type="file" accept="image/*" id="coverIn" style="display:none">';
  setupCoverDrop();
  document.getElementById('bookModal').classList.add('on');
}

function setupCoverDrop(){
  const d=document.getElementById('coverDrop'),i=document.getElementById('coverIn');
  d.onclick=()=>i.click();
  d.ondragover=e=>{e.preventDefault();d.classList.add('over')};d.ondragleave=()=>d.classList.remove('over');
  d.ondrop=e=>{e.preventDefault();d.classList.remove('over');rdImg(e.dataTransfer.files[0])};
  i.onchange=()=>{if(i.files[0])rdImg(i.files[0])};
}
function rdImg(f){if(!f||!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=e=>{coverB64=e.target.result;document.getElementById('coverDrop').innerHTML=`<img src="${coverB64}"><br>点击更换<input type="file" accept="image/*" id="coverIn" style="display:none">`;setupCoverDrop()};r.readAsDataURL(f)}

async function saveBook(){
  const title=document.getElementById('f-title').value.trim();
  if(!title)return alert('请输入书名');
  const body={title,author:document.getElementById('f-author').value.trim()};
  if(coverB64)body.cover=coverB64;
  if(editBookId){await api('/rooms/study/library/'+editBookId,'PUT',body);closeModals();loadDetail()}
  else{const r=await api('/rooms/study/library','POST',body);if(r.success){closeModals();curBook={id:r.id,...body,chapterCount:0};openBook(r.id)}}
}
async function delBook(){if(!confirm('确定删除这本书？'))return;await api('/rooms/study/library/'+editBookId,'DELETE');closeModals();goShelf()}

// ===== Book Detail =====
async function openBook(id){
  curBook=books.find(b=>b.id===id)||{id,title:'',author:''};
  await loadDetail();go('detail');
}
async function loadDetail(){
  const info=document.getElementById('detailInfo');
  // Refresh book info
  const allBooks=await api('/rooms/study/library');
  const b=allBooks.find(x=>x.id===curBook.id);if(!b)return goShelf();
  curBook=b;
  info.innerHTML=`
    <div class="detail-cover">${b.cover?`<img src="${b.cover}">`:`<div class="book-cover-ph" style="height:100%"><div class="t-ph">${esc(b.title)}</div></div>`}</div>
    <div class="detail-meta">
      <h2>${esc(b.title)}</h2>
      ${b.author?`<div class="author">${esc(b.author)}</div>`:''}
      <div class="stats">${b.chapterCount} 章 · ${b.totalParagraphs} 段</div>
      <div class="detail-actions">
        <button class="btn-e" onclick='openBookModal(${JSON.stringify({id:b.id,title:b.title,author:b.author,cover:b.cover}).replace(/'/g,"&#39;")})'>编辑</button>
        <button class="btn-d" onclick="editBookId='${b.id}';delBook()">删除</button>
      </div>
    </div>`;
  // Load chapters
  const chapters=await api(`/rooms/study/library/${b.id}/chapters`);
  document.getElementById('chListTitle').textContent=`目录 (${chapters.length}章)`;
  const cl=document.getElementById('chList');
  if(!chapters.length){cl.innerHTML='<div class="empty"><div class="ic">📄</div><p>还没有章节</p><p style="font-size:12px;margin-top:8px">点击「+ 添加章节」上传第一章</p></div>';return}
  cl.innerHTML=chapters.map((c,i)=>`
    <div class="ch-item" onclick="readChapter(${i})">
      <span class="ch-num">${i+1}</span>
      <span class="ch-title">${esc(c.title)}</span>
      <span class="ch-meta">${c.paragraphCount}段</span>
      <button class="btn-e" onclick="event.stopPropagation();openEditCh(${i},'${esc(c.title).replace(/'/g,"\\'")}')">编辑</button>
      <button class="btn-d" onclick="event.stopPropagation();delCh(${i})">删除</button>
      <span class="ch-arrow">→</span>
    </div>`).join('');
}

// ===== Chapter Modal =====
function openChModal(){
  editChIdx=null;
  document.getElementById('cmH').textContent='添加章节';
  document.getElementById('f-chtitle').value='';document.getElementById('f-chcontent').value='';
  document.getElementById('txtDrop').innerHTML='拖拽 .txt 文件<input type="file" accept=".txt,.text" id="txtIn" style="display:none">';
  setupTxtDrop();
  document.getElementById('chModal').classList.add('on');
}
function openEditCh(idx,title){
  editChIdx=idx;
  document.getElementById('cmH').textContent='编辑章节';
  document.getElementById('f-chtitle').value=title;document.getElementById('f-chcontent').value='';
  document.getElementById('txtDrop').innerHTML='拖拽 .txt 替换内容（可选）<input type="file" accept=".txt,.text" id="txtIn" style="display:none">';
  setupTxtDrop();
  document.getElementById('chModal').classList.add('on');
}

function setupTxtDrop(){
  const d=document.getElementById('txtDrop'),i=document.getElementById('txtIn');
  d.onclick=()=>i.click();
  d.ondragover=e=>{e.preventDefault();d.classList.add('over')};d.ondragleave=()=>d.classList.remove('over');
  d.ondrop=e=>{e.preventDefault();d.classList.remove('over');rdTxt(e.dataTransfer.files[0])};
  i.onchange=()=>{if(i.files[0])rdTxt(i.files[0])};
}
function rdTxt(f){if(!f)return;const r=new FileReader();r.onload=e=>{let t=e.target.result;if(t.includes('\ufffd')){const r2=new FileReader();r2.onload=e2=>{document.getElementById('f-chcontent').value=e2.target.result;document.getElementById('txtDrop').innerHTML='✓ '+f.name+'（GBK）<input type="file" accept=".txt,.text" id="txtIn" style="display:none">';setupTxtDrop()};r2.readAsText(f,'GBK')}else{document.getElementById('f-chcontent').value=t;document.getElementById('txtDrop').innerHTML='✓ '+f.name+'<input type="file" accept=".txt,.text" id="txtIn" style="display:none">';setupTxtDrop()}};r.readAsText(f,'UTF-8')}

async function saveCh(){
  const title=document.getElementById('f-chtitle').value.trim();
  const content=document.getElementById('f-chcontent').value.trim();
  if(editChIdx!==null){
    const body={};
    if(title)body.title=title;
    if(content)body.content=content;
    await api(`/rooms/study/library/${curBook.id}/chapters/${editChIdx}`,'PUT',body);
  }else{
    if(!content)return alert('请提供正文内容');
    await api(`/rooms/study/library/${curBook.id}/chapters`,'POST',{title:title||undefined,content});
  }
  closeModals();loadDetail();
}
async function delCh(i){if(!confirm('删除这个章节？'))return;await api(`/rooms/study/library/${curBook.id}/chapters/${i}`,'DELETE');loadDetail()}

// ===== Reader =====
async function readChapter(ci){
  curCh=ci;curPage=1;
  // Restore progress
  if(curBook.progress&&curBook.progress.chapter===ci)curPage=curBook.progress.page||1;
  go('reader');await loadReader();
}
async function loadReader(){
  const rc=document.getElementById('rContent');
  rc.innerHTML='<div class="empty"><p>加载中...</p></div>';
  try{
    const d=await api(`/rooms/study/library/${curBook.id}/read?chapter=${curCh}&page=${curPage}`);
    document.getElementById('rTitle').textContent=curBook.title;
    document.getElementById('rChapter').textContent=d.chapterTitle||`第${curCh+1}章`;
    document.getElementById('rPage').textContent=`${curPage}/${d.totalPages}页`;

    if(!d.paragraphs.length){rc.innerHTML='<div class="empty"><p>本章为空</p></div>';renderNav(d);return}

    const annMap={};
    (d.annotations||[]).forEach(a=>{if(!annMap[a.paraIndex])annMap[a.paraIndex]=[];annMap[a.paraIndex].push(a)});

    rc.innerHTML=d.paragraphs.map(p=>{
      const anns=annMap[p.index]||[];
      return`<div class="para-wrap${anns.length?' has-ann':''}" onclick="togAnn(${p.index})">
        <span class="para-idx">${p.index+1}</span>
        <div class="para-text">${esc(p.text)}</div>
        ${anns.length?`<div class="ann-list">${anns.map(a=>`
          <div class="ann-bubble ${a.author==='小羊'?'yang':'mu'}">
            <div class="ann-author">${esc(a.author)} <span class="ann-type">${TE[a.type]||'💬'}${TL[a.type]||''}</span></div>
            <div class="ann-text">${esc(a.content)}</div>
            <button class="ann-del" onclick="event.stopPropagation();delAnn('${a.id}')">✕</button>
          </div>`).join('')}</div>`:''}
        <div class="ann-input" id="ai-${p.index}">
          <textarea id="at-${p.index}" placeholder="写点什么..."></textarea>
          <div class="ann-input-bar">
            <select id="aa-${p.index}"><option value="小羊">小羊</option><option value="暮">暮</option></select>
            <select id="ay-${p.index}"><option value="comment">💬评论</option><option value="quote">✨好句</option><option value="analysis">🔍分析</option><option value="foreshadow">🔮伏笔</option><option value="roast">🗯️吐槽</option></select>
            <button class="btn btn-p" onclick="event.stopPropagation();postAnn(${p.index})" style="padding:5px 12px">发布</button>
          </div>
        </div>
      </div>`}).join('');

    renderNav(d);
    api(`/rooms/study/library/${curBook.id}/progress`,'PUT',{chapter:curCh,page:curPage});
  }catch(e){rc.innerHTML='<div class="empty"><p>加载失败</p></div>'}
}

function renderNav(d){
  const nb=document.getElementById('navBar');
  const hasPrev=curPage>1,hasNext=curPage<d.totalPages;
  const hasPrevCh=curCh>0,hasNextCh=curCh<d.totalChapters-1;
  nb.innerHTML=`
    ${hasPrevCh?`<button class="nav-btn ch-btn" onclick="curCh--;curPage=1;loadReader();window.scrollTo({top:0})">← 上一章</button>`:''}
    <button class="nav-btn" onclick="turnP(-1)" ${hasPrev?'':'disabled'}>‹ 上页</button>
    <span class="nav-info">${curPage} / ${d.totalPages}</span>
    <button class="nav-btn" onclick="turnP(1)" ${hasNext?'':'disabled'}>下页 ›</button>
    ${hasNextCh?`<button class="nav-btn ch-btn" onclick="curCh++;curPage=1;loadReader();window.scrollTo({top:0})">下一章 →</button>`:''}`;
}

function turnP(d){curPage+=d;if(curPage<1)curPage=1;loadReader();window.scrollTo({top:0,behavior:'smooth'})}

function togAnn(idx){
  document.querySelectorAll('.ann-input.on').forEach(e=>{if(e.id!=='ai-'+idx)e.classList.remove('on')});
  document.querySelectorAll('.para-wrap.active').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('ai-'+idx);if(!el)return;
  el.classList.toggle('on');
  if(el.classList.contains('on')){el.closest('.para-wrap').classList.add('active');el.querySelector('textarea').focus()}
}

async function postAnn(idx){
  const c=document.getElementById('at-'+idx).value.trim();if(!c)return;
  await api(`/rooms/study/library/${curBook.id}/annotations`,'POST',{
    chapter:curCh,paraIndex:idx,author:document.getElementById('aa-'+idx).value,
    content:c,type:document.getElementById('ay-'+idx).value
  });loadReader();
}
async function delAnn(id){if(!confirm('删除批注？'))return;await api(`/rooms/study/library/${curBook.id}/annotations/${id}`,'DELETE');loadReader()}

// Keyboard
document.addEventListener('keydown',e=>{
  if(!document.querySelector('#v-reader.on')||e.target.matches('input,textarea,select'))return;
  if(e.key==='ArrowLeft'){e.preventDefault();if(curPage>1)turnP(-1)}
  if(e.key==='ArrowRight'){e.preventDefault();turnP(1)}
});

loadShelf();
</script>
</body>
</html>
